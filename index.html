<script>
!function(){
    // 基础禁用
    document.oncontextmenu=()=>!1;
    document.onselectstart=()=>!1;
    document.ondragstart=()=>!1;
    window.onbeforeprint=()=>!1;
    window.addEventListener('copy',e=>e.preventDefault());
    window.addEventListener('cut',e=>e.preventDefault());

    // 快捷键屏蔽
    document.onkeydown=e=>{
        const c=e.ctrlKey,k=e.keyCode;
        if(k===123)return!1;
        if(c&&[73,83,85,80,117].includes(k))return!1;
        if(e.altKey&&k===68)return!1;
    };

    const kill=()=>{
        try{document.documentElement.innerHTML='';location.replace('about:blank');}catch(e){}
    };

    // 多层时间断点反调试
    setInterval(()=>{
        let s=performance.now();
        debugger;
        if(performance.now()-s>80)kill();
    },600);

    setInterval(()=>{
        let s=performance.now();
        debugger;debugger;
        if(performance.now()-s>80)kill();
    },900);

    // 窗口尺寸监听
    let w=window.innerWidth,h=window.innerHeight;
    setInterval(()=>{
        if(Math.abs(window.innerWidth-w)>120||Math.abs(window.innerHeight-h)>120)kill();
        w=window.innerWidth;h=window.innerHeight;
    },800);

    // 控制台劫持
    const noop=()=>{};
    console.log=console.warn=console.error=console.info=console.debug=noop;
    Object.defineProperty(window,'console',{value:{}});

    // 检测debugger绕过
    let _n=0;
    setInterval(()=>{
        try{eval('debugger');}catch(e){_n++;if(_n>2)kill();}
    },1000);
}();
</script>
